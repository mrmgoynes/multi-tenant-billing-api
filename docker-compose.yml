services:
  postgres_db:
    image: postgres:16-alpine
    container_name: billing_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: SecretPassword123
      POSTGRES_DB: billing_system
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: billing_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@billing.com
      PGADMIN_DEFAULT_PASSWORD: AdminPassword123
    ports:
      - "5050:80"
    depends_on:
      - postgres_db

volumes:
  postgres_data: